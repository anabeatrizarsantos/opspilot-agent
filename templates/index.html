<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpsPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <div class="chat-container">
    <div class="header">
      <div>
        <div class="title">OpsPilot</div>
        <div class="subtitle">Operations support agent</div>
      </div>
      <div class="subtitle">v0.1</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <div class="composer-input-wrap">
        <textarea id="message" rows="2" placeholder="Type your message..." maxlength="2000"></textarea>
        <div class="hint">Press Shift+Enter for a new line</div>
      </div>
      <button id="sendBtn" type="button" class="send-btn">
        <span class="send-btn-text">Send</span>
      </button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("message");
      const messagesDiv = document.getElementById("messages");
      const sendBtn = document.getElementById("sendBtn");
  
      function addBubble(text, who) {
        const div = document.createElement("div");
        div.className = `bubble ${who}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
  
      async function sendMessage() {
        const messageText = input.value.trim();
        if (!messageText) return;
  
        addBubble(messageText, "user");
        input.value = "";
        sendBtn.disabled = true;
  
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: messageText })
          });
  
          if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text}`);
          }
  
          const data = await res.json();
          addBubble(data.reply, "bot");
  
        } catch (err) {
          addBubble(`Error: ${err.message}`, "bot");
        } finally {
          sendBtn.disabled = false;
        }
      }
  
      sendBtn.addEventListener("click", sendMessage);
  
      // Enter does not send; only the Send button sends the message
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
        }
      });
  
      addBubble("Hi! Tell me what you need help with.", "bot");
    });
  </script>

</body>
</html>
